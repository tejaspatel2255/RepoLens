<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Lens Gradient -->
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    
    <!-- Git Branch Gradient -->
    <linearGradient id="gitGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#fb923c" />
    </linearGradient>
    
    <!-- Drop Shadow / Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Git Repo Branching lines -->
  <path d="M 32,50 L 52,50 L 67,32 M 52,50 L 67,68" stroke="url(#gitGrad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9" />
  
  <!-- Git Repo Nodes -->
  <circle cx="32" cy="50" r="5.5" fill="#f43f5e" />
  <circle cx="67" cy="32" r="5.5" fill="#fb923c" />
  <circle cx="67" cy="68" r="5.5" fill="#fb923c" />

  <!-- Lens/Magnifying glass looking at the branch intersection -->
  <!-- Handle -->
  <line x1="47" y1="53" x2="26" y2="74" stroke="url(#lensGrad)" stroke-width="6.5" stroke-linecap="round" />
  
  <!-- Lens Frame -->
  <circle cx="58" cy="42" r="18" stroke="url(#lensGrad)" stroke-width="4.5" fill="none" filter="url(#glow)" />
  
  <!-- Inner Glass reflection/glow -->
  <circle cx="58" cy="42" r="15.5" fill="rgba(56, 189, 248, 0.12)" />
  
  <!-- Reflection highlight -->
  <path d="M 47,38 A 15,15 0 0,1 63,28" stroke="white" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.65" />
</svg>
